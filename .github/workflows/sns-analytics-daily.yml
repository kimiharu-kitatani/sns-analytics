name: SNS Analytics Daily Record

on:
  workflow_dispatch:
  schedule:
    # 15:05 UTC is 00:05 JST.
    - cron: "5 15 * * *"

jobs:
  record:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-cloud.txt

      - name: Record SNS follower counts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_TABLE: ${{ secrets.SUPABASE_TABLE }}
        run: python cloud_daily_record.py
